name: Python checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Compile Python files
        run: python -m compileall .
      - name: Validate public network JSON
        run: python logicoin_public_network.py
      - name: Privacy scan
        run: python scripts/privacy_scan.py
